name: release-please

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      publish:
        description: "Force the npm publish step to run (e.g. to retry a publish that failed after the release was already created)"
        type: boolean
        default: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    env:
      NODE_ENV: production
      CI: true

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_GH_TOKEN }}
          release-type: node

      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run typecheck

      - name: Run lint
        run: bun run lint:CI

      - name: Run test
        run: bun test

      - name: Run build
        run: bun run build

      - run: bunx pkg-pr-new publish --bin --binaryApplication

      # bun publish doesn't yet support npm's OIDC trusted publishing
      # (https://github.com/oven-sh/bun/issues/24855), so the actual
      # publish step uses the real npm CLI, which needs to be >=11.5.1.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
        if: ${{ steps.release.outputs.release_created || inputs.publish }}

      - name: Update npm
        run: npm install -g npm@latest
        if: ${{ steps.release.outputs.release_created || inputs.publish }}

      - name: Publish to npm
        run: npm publish --access public
        if: ${{ steps.release.outputs.release_created || inputs.publish }}
